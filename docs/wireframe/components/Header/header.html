<header class="store-header">
    <div class="container store-header-content">
        <button class="brand-button" id="header-brand-button" type="button">
            <span class="brand-text">
                <span class="brand-primary" id="header-brand-primary"></span>
                <span class="brand-dot">.</span>
            </span>
        </button>

        <button
            class="icon-button mobile-search-toggle"
            id="mobile-search-toggle"
            type="button"
        ></button>

        <button
            class="icon-button department-button"
            id="header-department-button"
            type="button"
        ></button>

        <form class="search-form" id="search-form">
            <input class="search-field" id="header-search-field" type="search" />

            <label class="search-category-field">
                <span class="screen-reader-only" id="header-search-category-label"></span>
                <select class="search-category-select" id="header-search-category-select"></select>
            </label>

            <button class="search-button" id="header-search-button" type="submit"></button>
        </form>

        <div class="header-actions" id="header-actions"></div>
    </div>
</header>
