<section class="hero-section">
    <article class="container hero-slider" id="hero-slider">   
        <div class="hero-copy">
            <span class="hero-overline" id="hero-overline">Compre o que você curte</span>

            <h1 class="hero-title" id="hero-title">
                <span>Consoles e games</span>
                <span>Com entrega digital</span>
                <span>E ofertas de até 40%</span>
            </h1>

            <div class="hero-actions">
                <button
                    class="primary-button"
                    type="button"
                    id="hero-primary-button"
                >   
                    <span id="hero-primary-label"></span>
                </button>

                <button
                    class="secondary-button"
                    type="button"
                    id="hero-secondary-button"
                >
                    <span id="hero-secondary-label"></span>
                </button>
            </div>
        </div>

        <div class="hero-visual" id="hero-visual"></div>

        <div class="hero-controls">
            <button
                class="hero-arrow-button"
                id="hero-prev"
                type="button"
                aria-label="Banner anterior"
            >
                <i data-lucide="chevron-left"></i>
            </button>
            
            <div class="hero-dots" id="hero-dots" aria-label="Navegação dos banners"></div>
            
            <button
                class="hero-arrow-button"
                id="hero-next"
                type="button"
                aria-label="Próximo banner"
            >
                <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </article>

    <div class="container hero-info-cards" id="hero-info-cards"></div>
    <div class="container hero-benefits-strip" id="hero-benefits-strip"></div>
</section>
